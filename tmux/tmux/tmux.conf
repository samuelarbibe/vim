# Use 256 colors and true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Mouse support
set -g mouse on
set -g set-clipboard on

# Copy to system clipboard (macOS)
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Increase scrollback
set -g history-limit 50000

# --- OneDark Theme ---
# Pane borders
set -g pane-border-style "fg=#3e4452"
set -g pane-active-border-style "fg=#61afef"

# Status bar
set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#282c34,fg=#61afef]"
set -g status-right "#[fg=#5c6370]%Y-%m-%d #[fg=#abb2bf]%H:%M #[bg=#98c379,fg=#282c34,bold] #h "

# Window tabs
set -g window-status-format "#[fg=#5c6370] #I:#W "
set -g window-status-current-format "#[bg=#3e4452,fg=#61afef,bold] #I:#W "
set -g window-status-separator ""

# Messages & command line
set -g message-style "bg=#282c34,fg=#e5c07b"
set -g message-command-style "bg=#282c34,fg=#e5c07b"

# Clock
set -g clock-mode-colour "#61afef"

# Copy mode highlight
set -g mode-style "bg=#3e4452,fg=#abb2bf"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum: auto-restore and auto-save every 10 minutes
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
